<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Tunisia - Standalone Version</title>
    
    <!-- Essential CSS Inline -->
    <style>
        :root {
            --bg-0: #ffffff;
            --bg-1: #f8f7ff;
            --bg-2: #f0eeff;
            --bg-3: #e8e4ff;
            --purple-ultra: #f5f2ff;
            --purple-pale: #ede8ff;
            --purple-deep: #1e0a4e;
            --purple-main: #4a1fa8;
            --purple-mid: #6b3fd4;
            --purple-light: #9b72f0;
            --accent: #7c3aed;
            --accent-hover: #6d28d9;
            --white: #ffffff;
            --champagne: #1e0a4e;
            --gold: #7c3aed;
            --gold-mid: #6b3fd4;
            --gold-light: #9b72f0;
            --text-dark: #1a1035;
            --text-body: #3d3460;
            --text-muted: #7b72a8;
            --text-dim: #b0a8d4;
            --glass: #ffffff;
            --glass-border: rgba(107,63,212,0.12);
            --glass-border-hover: rgba(107,63,212,0.35);
            --border: rgba(107,63,212,0.12);
            --border-hover: rgba(107,63,212,0.35);
            --shadow-sm: 0 2px 8px rgba(74,31,168,0.07);
            --shadow: 0 4px 20px rgba(74,31,168,0.11);
            --shadow-lg: 0 12px 40px rgba(74,31,168,0.16);
            --shadow-xl: 0 24px 60px rgba(74,31,168,0.2);
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --info: #2563eb;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 18px;
            --radius-xl: 24px;
            --transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Outfit', system-ui, sans-serif;
        }

        *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { background: #ffffff; color: #1a1035; font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; cursor: none; }
        a { color: inherit; text-decoration: none; cursor: none; }
        button { cursor: none; font-family: var(--font-body); }
        
        .page { display: none; padding: 0; min-height: 100vh; }
        .page.active { display: block; }
        
        /* Navigation */
        nav { position: sticky; top: 0; z-index: 1000; background: white; border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 72px; }
        .nav-logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; cursor: pointer; }
        .nav-btn { background: none; border: none; color: var(--text-body); padding: 0.5rem 1rem; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: var(--transition); }
        .nav-btn:hover { background: var(--bg-1); color: var(--accent); }
        .nav-btn.active { background: var(--accent); color: white; }
        
        /* Vendor Dashboard */
        .vendor-dashboard { padding: 2rem; background: var(--bg-1); min-height: 100vh; }
        .dashboard-header { background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 2rem; box-shadow: var(--shadow-sm); }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        .dashboard-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: var(--shadow-sm); }
        .dashboard-card h3 { color: var(--champagne); margin-bottom: 1rem; font-size: 1.2rem; }
        .dashboard-card p { color: var(--text-muted); line-height: 1.6; }
        
        /* Success state */
        .success-message { text-align: center; padding: 4rem; color: var(--success); }
        .success-message h1 { font-size: 2rem; margin-bottom: 1rem; }
        .success-message .icon { font-size: 4rem; margin-bottom: 1rem; }
        .debug-info { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 1rem; border-radius: var(--radius); margin: 1rem 0; text-align: left; }
        .btn { background: var(--accent); color: white; border: none; padding: 0.875rem 2rem; border-radius: var(--radius); font-weight: 600; cursor: pointer; transition: var(--transition); }
        .btn:hover { background: var(--accent-hover); }
    </style>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
</head>
<body>
    <!-- Navigation -->
    <nav>
        <a class="nav-logo" onclick="showPage('home')">
            <div style="font-size: 1.5rem; font-weight: bold; color: var(--accent);">🛍️ Shopping</div>
        </a>
        <div>
            <button class="nav-btn" onclick="showPage('home')">Home</button>
            <button class="nav-btn" onclick="showPage('vendor')">Vendor</button>
            <button class="nav-btn" onclick="showPage('vendor-dashboard')">Dashboard</button>
        </div>
    </nav>

    <!-- Pages -->
    <div class="page active" id="page-home">
        <div class="vendor-dashboard">
            <div class="dashboard-header">
                <h1>Welcome to Shopping Tunisia</h1>
                <p>Test the vendor dashboard functionality</p>
            </div>
            <div class="dashboard-grid">
                <div class="dashboard-card">
                    <h3>🏠 Home</h3>
                    <p>Main landing page with product listings.</p>
                    <button class="btn" onclick="showPage('home')">Go to Home</button>
                </div>
                <div class="dashboard-card">
                    <h3>👤 Vendor</h3>
                    <p>Vendor management page with tabs.</p>
                    <button class="btn" onclick="showPage('vendor')">Go to Vendor</button>
                </div>
                <div class="dashboard-card">
                    <h3>📊 Dashboard</h3>
                    <p>Comprehensive vendor dashboard.</p>
                    <button class="btn" onclick="showPage('vendor-dashboard')">Go to Dashboard</button>
                </div>
            </div>
        </div>
    </div>

    <div class="page" id="page-vendor">
        <div class="vendor-dashboard">
            <div class="dashboard-header">
                <h1>Vendor Management</h1>
                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button class="btn" onclick="switchVendorSection('overview')">Overview</button>
                    <button class="btn" onclick="switchVendorSection('dashboard')">📊 Dashboard</button>
                    <button class="btn" onclick="switchVendorSection('upload')">Upload</button>
                    <button class="btn" onclick="switchVendorSection('inventory')">Inventory</button>
                    <button class="btn" onclick="switchVendorSection('orders')">Orders</button>
                </div>
            </div>
            <div id="vendor-content">
                <div class="dashboard-card">
                    <h3>Vendor Overview</h3>
                    <p>This is the vendor overview section.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="page" id="page-vendor-dashboard">
        <div class="vendor-dashboard">
            <!-- Content will be populated by renderVendorDashboard() -->
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Global state
        const State = {
            currentUser: {
                id: 1,
                name: 'Test Vendor',
                role: 'vendor',
                shop_name: 'Test Shop',
                verified: true
            },
            currentPage: 'home'
        };

        // Page navigation
        function showPage(id) {
            console.log('🔄 showPage called with:', id);
            
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const page = document.getElementById('page-' + id);
            if (!page) {
                console.log('❌ Page element not found: page-' + id);
                return;
            }
            
            console.log('✅ Page element found:', page);
            page.classList.add('active');
            State.currentPage = id;

            // Update nav buttons
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const navBtn = document.querySelector(`.nav-btn[onclick="showPage('${id}')"]`);
            if (navBtn) navBtn.classList.add('active');

            // Render page content
            const renderers = {
                home: renderHome,
                vendor: renderVendor,
                'vendor-dashboard': renderVendorDashboard
            };
            
            console.log('🔄 Available renderers:', Object.keys(renderers));
            console.log('🔄 Looking for renderer:', id);
            
            if (renderers[id]) {
                console.log('✅ Found renderer, calling:', id);
                renderers[id]();
            } else {
                console.log('❌ No renderer found for:', id);
            }
        }

        // Page renderers
        function renderHome() {
            console.log('🏠 Home page rendered');
        }

        function renderVendor() {
            console.log('👤 Vendor page rendered');
        }

        function renderVendorDashboard() {
            console.log('📊 renderVendorDashboard called');
            
            if (!State.currentUser || State.currentUser.role !== 'vendor') {
                console.log('❌ Vendor access check failed - current user:', State.currentUser);
                document.getElementById('page-vendor-dashboard').innerHTML = `
                    <div class="success-message" style="color: var(--text-muted);">
                        <div class="icon">🔒</div>
                        <h2>Vendor Access Required</h2>
                        <p>You need to be logged in as a vendor to access this dashboard.</p>
                    </div>
                `;
                return;
            }
            
            console.log('✅ Vendor access check passed - user is vendor');
            
            // Simple test - just show a success message first
            document.getElementById('page-vendor-dashboard').innerHTML = `
                <div class="success-message">
                    <div class="icon">✅</div>
                    <h1>Vendor Dashboard Working!</h1>
                    <p>The vendor dashboard page is loading correctly.</p>
                    <div class="debug-info">
                        <strong>Debug Info:</strong><br>
                        User: ${State.currentUser?.name || 'Unknown'}<br>
                        Role: ${State.currentUser?.role || 'Unknown'}<br>
                        Shop: ${State.currentUser?.shop_name || 'Unknown'}
                    </div>
                    <button class="btn" onclick="showPage('vendor')">← Back to Vendor Page</button>
                </div>
            `;
            
            console.log('✅ Simple vendor dashboard rendered successfully');
        }

        // Vendor section switching
        function switchVendorSection(section) {
            console.log('🔄 switchVendorSection called with:', section);
            
            const content = document.getElementById('vendor-content');
            if (!content) return;

            // Handle dashboard case first - redirect to standalone dashboard
            if (section === 'dashboard') {
                console.log('🔄 Dashboard section clicked, redirecting to vendor-dashboard page...');
                showPage('vendor-dashboard');
                return;
            }

            // Handle other sections
            if (section === 'overview') {
                content.innerHTML = `
                    <div class="dashboard-card">
                        <h3>Vendor Overview</h3>
                        <p>Welcome to your vendor overview. Here you can see your shop statistics and recent activity.</p>
                    </div>
                `;
            } else if (section === 'upload') {
                content.innerHTML = `
                    <div class="dashboard-card">
                        <h3>Upload Product</h3>
                        <p>Upload new products to your shop.</p>
                    </div>
                `;
            } else if (section === 'inventory') {
                content.innerHTML = `
                    <div class="dashboard-card">
                        <h3>My Products</h3>
                        <p>Manage your product inventory.</p>
                    </div>
                `;
            } else if (section === 'orders') {
                content.innerHTML = `
                    <div class="dashboard-card">
                        <h3>My Orders</h3>
                        <p>View and manage customer orders.</p>
                    </div>
                `;
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Standalone Shopping App loaded');
            showPage('home');
        });
    </script>

    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
</body>
</html>
