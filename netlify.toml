[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "no-store"
    
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "no-store"
